<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">MARA End-to-End Workflow</title>
  <desc id="desc">Workflow diagram showing how a user prompt flows through the Braight frontend, MARA FastAPI backend, Qdrant collections, Groq calls, Supabase hydration, and the browse-memory feedback loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f4ec"/>
      <stop offset="55%" stop-color="#eef4f7"/>
      <stop offset="100%" stop-color="#f5faf6"/>
    </linearGradient>
    <linearGradient id="titleBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f2a3d"/>
      <stop offset="100%" stop-color="#1e5f64"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#122433" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e5565"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a8d97"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 400 17px 'Segoe UI', Arial, sans-serif; fill: #d9e7ee; }
      .lane-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #173243; }
      .lane-sub { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #56717f; }
      .card-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #163242; }
      .card-body { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #284150; }
      .small { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #5d7380; }
      .chip { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #305062; }
      .note { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #725b19; }
      .legend { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #294656; }
      .mono { font: 600 13px Consolas, 'Courier New', monospace; fill: #284150; }
      .step { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1120" fill="url(#bg)"/>
  <rect x="36" y="28" width="1528" height="120" rx="26" fill="url(#titleBar)" filter="url(#shadow)"/>
  <text x="74" y="80" class="title">MARA End-to-End Workflow</text>
  <text x="74" y="110" class="subtitle">User prompt -> Braight frontend -> MARA FastAPI -> Qdrant memory and ranking -> Groq reply -> Supabase hydration -> UI render -> browse feedback loop</text>

  <rect x="1240" y="52" width="270" height="64" rx="18" fill="#ffffff" fill-opacity="0.10" stroke="#b7d3dd" stroke-opacity="0.28"/>
  <circle cx="1272" cy="84" r="8" fill="#d7b24a"/>
  <text x="1288" y="89" class="legend" fill="#ffffff">Frontend action</text>
  <circle cx="1398" cy="84" r="8" fill="#52a3b0"/>
  <text x="1414" y="89" class="legend" fill="#ffffff">Backend process</text>
  <circle cx="1514" cy="84" r="8" fill="#d7615d"/>
  <text x="1530" y="89" class="legend" fill="#ffffff" text-anchor="end">Data store or model</text>

  <rect x="50" y="180" width="280" height="860" rx="28" fill="#fff7e5" stroke="#e2c779" stroke-width="2"/>
  <rect x="350" y="180" width="350" height="860" rx="28" fill="#eef9fb" stroke="#94cbd3" stroke-width="2"/>
  <rect x="720" y="180" width="420" height="860" rx="28" fill="#eef7f4" stroke="#96c7b6" stroke-width="2"/>
  <rect x="1160" y="180" width="390" height="860" rx="28" fill="#fff2ef" stroke="#df9d93" stroke-width="2"/>

  <text x="78" y="226" class="lane-title">1. User and UI</text>
  <text x="78" y="248" class="lane-sub">Prompt, chip confirmation, product click</text>
  <text x="378" y="226" class="lane-title">2. Braight Frontend</text>
  <text x="378" y="248" class="lane-sub">[Index.tsx], [ChatWindow.tsx], [maraApi.ts]</text>
  <text x="748" y="226" class="lane-title">3. MARA FastAPI Backend</text>
  <text x="748" y="248" class="lane-sub">[main.py], [mara_engine.py], [user_memory.py]</text>
  <text x="1188" y="226" class="lane-title">4. External Systems</text>
  <text x="1188" y="248" class="lane-sub">Qdrant collections, Groq, Supabase</text>

  <g filter="url(#shadow)">
    <rect x="82" y="282" width="216" height="88" rx="22" fill="#d7b24a"/>
    <text x="100" y="316" class="step">STEP 1</text>
    <text x="100" y="340" class="card-title" fill="#ffffff">User types prompt</text>
    <text x="100" y="362" class="small" fill="#fff7da">"Warm bedroom ceiling light under 300 CHF, no plastic"</text>

    <rect x="390" y="282" width="270" height="100" rx="22" fill="#52a3b0"/>
    <text x="410" y="316" class="step">STEP 2</text>
    <text x="410" y="340" class="card-title" fill="#ffffff">handleSendMessage()</text>
    <text x="410" y="362" class="small" fill="#e8f8fb">Frontend starts search flow and stores the typed text.</text>

    <rect x="390" y="430" width="270" height="108" rx="22" fill="#52a3b0"/>
    <text x="410" y="464" class="step">STEP 3A</text>
    <text x="410" y="488" class="card-title" fill="#ffffff">POST /extract</text>
    <text x="410" y="510" class="small" fill="#e8f8fb">Ask backend to detect possible hard constraints and show confirmation chips.</text>

    <rect x="390" y="590" width="270" height="108" rx="22" fill="#52a3b0"/>
    <text x="410" y="624" class="step">STEP 3B</text>
    <text x="410" y="648" class="card-title" fill="#ffffff">POST /chat</text>
    <text x="410" y="670" class="small" fill="#e8f8fb">Ask MARA for the actual ranked results and the assistant reply.</text>

    <rect x="760" y="410" width="340" height="138" rx="22" fill="#3a8f7b"/>
    <text x="782" y="444" class="step">STEP 4</text>
    <text x="782" y="468" class="card-title" fill="#ffffff">extract_constraints()</text>
    <text x="782" y="492" class="small" fill="#e7f7f1">Groq turns the sentence into structured suggestions like budget, kelvin, room type, and forbidden material.</text>
    <text x="782" y="518" class="mono" fill="#ffffff">max_price_chf=300, kelvin_max=2700, room_type=bedroom</text>

    <rect x="82" y="440" width="216" height="122" rx="22" fill="#d7b24a"/>
    <text x="100" y="474" class="step">STEP 5</text>
    <text x="100" y="498" class="card-title" fill="#ffffff">User sees chips</text>
    <text x="100" y="522" class="small" fill="#fff7da">Suggested filters come back to the chat UI.</text>
    <text x="100" y="544" class="small" fill="#fff7da">They are not active until the user clicks Yes.</text>

    <rect x="82" y="622" width="216" height="98" rx="22" fill="#d7b24a"/>
    <text x="100" y="656" class="step">STEP 6</text>
    <text x="100" y="680" class="card-title" fill="#ffffff">Optional chip accept</text>
    <text x="100" y="702" class="small" fill="#fff7da">User confirms one or more suggested constraints.</text>

    <rect x="390" y="744" width="270" height="98" rx="22" fill="#52a3b0"/>
    <text x="410" y="778" class="step">STEP 7</text>
    <text x="410" y="802" class="card-title" fill="#ffffff">POST /constraints</text>
    <text x="410" y="824" class="small" fill="#e8f8fb">Save accepted hard constraints for future ranking.</text>

    <rect x="760" y="744" width="340" height="132" rx="22" fill="#3a8f7b"/>
    <text x="782" y="778" class="step">STEP 8</text>
    <text x="782" y="802" class="card-title" fill="#ffffff">save_constraints()</text>
    <text x="782" y="826" class="small" fill="#e7f7f1">Backend merges the values into runtime constraint state and also writes structural memory.</text>
    <text x="782" y="850" class="small" fill="#e7f7f1">Those values are later used by MARA retrieval.</text>

    <rect x="760" y="590" width="340" height="120" rx="22" fill="#3a8f7b"/>
    <text x="782" y="624" class="step">STEP 9</text>
    <text x="782" y="648" class="card-title" fill="#ffffff">chat()</text>
    <text x="782" y="672" class="small" fill="#e7f7f1">Embed query, load saved constraints and preference recency, then run baseline plus MARA ranking.</text>

    <rect x="1188" y="334" width="324" height="118" rx="22" fill="#d7615d"/>
    <text x="1210" y="368" class="step">QDRANT MEMORY</text>
    <text x="1210" y="392" class="card-title" fill="#ffffff">user_memory</text>
    <text x="1210" y="416" class="small" fill="#fff0ee">Structural: accepted constraints</text>
    <text x="1210" y="438" class="small" fill="#fff0ee">Semantic: learned tastes</text>
    <text x="1210" y="460" class="small" fill="#fff0ee">Episodic: recently viewed products</text>

    <rect x="1188" y="498" width="324" height="140" rx="22" fill="#d7615d"/>
    <text x="1210" y="532" class="step">QDRANT PRODUCT SEARCH</text>
    <text x="1210" y="556" class="card-title" fill="#ffffff">hard_constraints + soft_preferences</text>
    <text x="1210" y="580" class="small" fill="#fff0ee">Hard collection: filterable facts like price, wattage, kelvin, indoor and outdoor flags.</text>
    <text x="1210" y="604" class="small" fill="#fff0ee">Soft collection: richer semantic text, tags, finish, image metadata.</text>

    <rect x="1188" y="680" width="324" height="100" rx="22" fill="#d7615d"/>
    <text x="1210" y="714" class="step">LLM</text>
    <text x="1210" y="738" class="card-title" fill="#ffffff">Groq reply generation</text>
    <text x="1210" y="760" class="small" fill="#fff0ee">Prompt uses memory summary plus top ranked products.</text>

    <rect x="1188" y="826" width="324" height="114" rx="22" fill="#d7615d"/>
    <text x="1210" y="860" class="step">CATALOG SOURCE</text>
    <text x="1210" y="884" class="card-title" fill="#ffffff">Supabase hydration</text>
    <text x="1210" y="908" class="small" fill="#fff0ee">Frontend fetches real article records using ordered article IDs returned by MARA.</text>

    <rect x="390" y="892" width="270" height="104" rx="22" fill="#52a3b0"/>
    <text x="410" y="926" class="step">STEP 10</text>
    <text x="410" y="950" class="card-title" fill="#ffffff">Hydrate and render</text>
    <text x="410" y="972" class="small" fill="#e8f8fb">Merge Supabase products with MARA scores, then render cards and detail views.</text>

    <rect x="82" y="884" width="216" height="112" rx="22" fill="#d7b24a"/>
    <text x="100" y="918" class="step">STEP 11</text>
    <text x="100" y="942" class="card-title" fill="#ffffff">User opens a product</text>
    <text x="100" y="964" class="small" fill="#fff7da">A click becomes a browse event that teaches the system what was recently interesting.</text>

    <rect x="760" y="912" width="340" height="96" rx="22" fill="#3a8f7b"/>
    <text x="782" y="946" class="step">STEP 12</text>
    <text x="782" y="970" class="card-title" fill="#ffffff">log_browse()</text>
    <text x="782" y="992" class="small" fill="#e7f7f1">Backend stores an episodic memory entry so the next query has recent browsing context.</text>
  </g>

  <path d="M 298 326 L 390 326" fill="none" stroke="#2e5565" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 525 382 L 525 430" fill="none" stroke="#2e5565" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 660 484 L 760 484" fill="none" stroke="#2e5565" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 930 548 L 930 570 L 660 570 L 660 640" fill="none" stroke="#7a8d97" stroke-width="3.2" stroke-dasharray="10 9" marker-end="url(#arrowMuted)"/>
  <path d="M 660 646 L 760 646" fill="none" stroke="#2e5565" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 1100 470 L 1188 410" fill="none" stroke="#2e5565" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 1100 650 L 1188 568" fill="none" stroke="#2e5565" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 1100 650 L 1188 730" fill="none" stroke="#2e5565" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 298 671 L 390 793" fill="none" stroke="#2e5565" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 660 793 L 760 810" fill="none" stroke="#2e5565" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 1100 812 L 1188 406" fill="none" stroke="#7a8d97" stroke-width="3.2" stroke-dasharray="10 9" marker-end="url(#arrowMuted)"/>
  <path d="M 525 698 L 525 744" fill="none" stroke="#7a8d97" stroke-width="3.2" stroke-dasharray="10 9" marker-end="url(#arrowMuted)"/>
  <path d="M 1100 634 L 1188 568" fill="none" stroke="#2e5565" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 1512 883 L 660 944" fill="none" stroke="#2e5565" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 390 944 L 298 944" fill="none" stroke="#2e5565" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 298 944 L 760 960" fill="none" stroke="#2e5565" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 1100 958 L 1188 410" fill="none" stroke="#2e5565" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="103" y="585" width="173" height="22" rx="11" fill="#fff3c7" stroke="#ddb852"/>
  <text x="189.5" y="600" class="note" text-anchor="middle">Chip confirmation happens after extraction</text>

  <rect x="730" y="282" width="780" height="82" rx="22" fill="#ffffff" stroke="#d5e0e5" filter="url(#shadow)"/>
  <text x="756" y="312" class="card-title">What MARA is doing in plain language</text>
  <text x="756" y="338" class="card-body">1) detect possible constraints, 2) optionally save confirmed hard rules, 3) rank products with Qdrant, 4) generate a short reply, 5) hydrate full product data from Supabase, 6) learn from clicks.</text>

  <rect x="730" y="1026" width="780" height="54" rx="18" fill="#ffffff" stroke="#d5e0e5"/>
  <text x="756" y="1058" class="card-body">Feedback loop: every accepted chip strengthens structural memory; every product click adds episodic memory; the next search uses both.</text>
</svg>
