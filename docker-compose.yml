version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# MARA — N2N Docker Compose
#
# Services:
#   qdrant    → vector DB (port 6333)
#   backend   → FastAPI MARA agent (port 8001)
#   frontend  → React/Vite dev server (port 8080)
#
# First run:
#   docker compose up --build
#   docker compose exec backend python extract_supabase_catalog.py
#   docker compose exec backend python setup_qdrant.py
#   docker compose exec backend python enrich_products.py
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Qdrant (vector database) ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mara_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # ── MARA Backend (FastAPI) ──────────────────────────────────────────────────
  backend:
    build:
      context: ./mara_backend
      dockerfile: Dockerfile
    container_name: mara_backend
    ports:
      - "8001:8001"
    env_file:
      - ./mara_backend/.env
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    volumes:
      - ./mara_backend:/app
    restart: unless-stopped

  # ── Braight Frontend (Vite dev) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./braight
      dockerfile: Dockerfile.dev
    container_name: mara_frontend
    ports:
      - "8080:8080"
    env_file:
      - ./braight/.env
    environment:
      - VITE_MARA_BASE_URL=http://localhost:8001
    depends_on:
      - backend
    volumes:
      - ./braight:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  qdrant_storage:
